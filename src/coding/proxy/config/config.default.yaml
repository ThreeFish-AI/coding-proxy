database:
  path: "~/.coding-proxy/usage.db"

# === OAuth 登录配置 ===
auth:
  # GitHub Device Flow client_id（默认使用 Copilot VS Code 扩展公开 ID）
  # github_client_id: "Iv1.b507a08c87ecfe98"
  # Google OAuth 凭据（默认使用 Antigravity Enterprise 公开凭据，无需手动配置）
  # google_client_id: ""
  # google_client_secret: ""
  token_store_path: "~/.coding-proxy/tokens.json"

# === 原生 API 透传（/api/{openai,gemini,anthropic}/**）===
#
# 三家 provider 默认 enabled=true（开箱即用）。
# 客户端将 SDK base_url 改为 http://127.0.0.1:3392/api/{openai,gemini,anthropic}
# 即可直接触达官方上游；认证（Authorization / x-api-key / ?key=）由客户端自带，
# proxy 不保管凭据。
#
# 将 base_url 指向第三方代理的两种方式（优先级：env > yaml > 内置默认）：
#   方式 A（推荐部署/容器场景）：设置环境变量
#     NATIVE_OPENAI_BASE_URL     / NATIVE_GEMINI_BASE_URL     / NATIVE_ANTHROPIC_BASE_URL
#   方式 B（推荐本地开发/团队共享）：直接编辑下方 base_url 字段
#
# 如需禁用某家 provider，将对应 enabled 改为 false 即可。
# base_url 字段的值与 Pydantic 内置默认保持一致（由 tests/test_native_api_base_url_override.py
# 的 test_default_config_yaml_matches_pydantic_builtin 守护双写同步）。
native_api:
  openai:
    enabled: true
    base_url: "https://api.openai.com"
    timeout_ms: 300000
    connect_timeout_ms: 15000
  gemini:
    enabled: true
    base_url: "https://generativelanguage.googleapis.com"
    timeout_ms: 300000
    connect_timeout_ms: 15000
  anthropic:
    enabled: true
    base_url: "https://api.anthropic.com"
    timeout_ms: 300000
    connect_timeout_ms: 15000

# === Session 级别路由策略（可选）===
#
# 为特定 Session 或客户端类别定制 vendor 优先级顺序。
# 匹配策略按定义顺序求值，首次匹配生效。
#
# 支持的匹配条件（OR 语义，满足任一即匹配）：
#   session_keys:    精确匹配的 session key 列表
#   client_category: 按客户端类别匹配（⚠️ 预留字段，当前版本暂未生效，后续版本支持）
#
# tiers: 覆盖全局 tier 顺序的供应商优先级列表（未提及的 vendor 保持在末尾）
#
# 示例 1：为特定 session 绑定专属 vendor 组合
#   session_policies:
#     - name: "vip-session"
#       match:
#         session_keys: ["my-specific-session-id"]
#       tiers: ["anthropic", "copilot", "zhipu"]
#
# 示例 2：Claude Code 请求优先走 Copilot
#   session_policies:
#     - name: "claude-code-preferred"
#       match:
#         client_category: "cc"
#       tiers: ["copilot", "anthropic", "zhipu"]
#
# 未配置时（默认），所有 Session 使用全局 tiers 顺序。
session_policies: []
