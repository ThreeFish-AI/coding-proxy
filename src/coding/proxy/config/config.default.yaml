# coding-proxy 默认配置（模板）
# 复制到 ./config.yaml（项目根目录）或 ~/.coding-proxy/config.yaml 并修改自定义设置
# 优先级：./config.yaml > ~/.coding-proxy/config.yaml

server:
  host: "127.0.0.1"
  port: 3392

logging:
  level: "INFO"
  # file: "coding-proxy.log"          # 文件日志路径；设为 null 或空字符串禁用
  # max_bytes: 5242880                # 单文件上限（5 MB），触发轮转
  # backup_count: 5                   # 保留 gzip 压缩备份文件数

# === 降级链路优先级（可选） ===
#
# 显式指定故障转移时的供应商尝试顺序。
# 未配置时回退到 vendors 列表的原始顺序。
#
# 引用的 vendor 名称必须在上方 vendors 中定义且 enabled=true。
# 可用于在不改变 vendors 定义顺序的情况下灵活调整降级策略。
#
# 示例 1：完整四层降级链路（默认行为等效）
#   tiers: ["anthropic", "copilot", "antigravity", "zhipu"]
#
# 示例 2：跳过中间层，仅保留首尾两级
#   tiers: ["anthropic", "zhipu"]
#
# 示例 3：将 zhipu 提升为首选，anthropic 作为后备
#   tiers: ["zhipu", "anthropic"]

tiers: ["zhipu", "anthropic", "copilot", "antigravity"]

# === 供应商定义（vendors 列表） ===
#
# 每个 vendor 通过 vendor 字段指定供应商类型：
#   anthropic | zhipu | minimax | alibaba | xiaomi | kimi | doubao | copilot | antigravity
#
# 优先级规则：
#   - 若配置了 tiers，以其指定的顺序为准
#   - 否则 vendors 列表顺序即优先级（index 越小越优先）
#   - 无 circuit_breaker 的 vendor 自动成为终端层（不再向下故障转移）

vendors:
  # Vendor 0: Claude Plans（最高优先级）
  - vendor: anthropic
    base_url: "https://api.anthropic.com"
    timeout_ms: 300000
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout_seconds: 300
      success_threshold: 2
    quota_guard:
      enabled: false
      token_budget: 65000000 # 5 小时 token 预算（根据订阅计划调整）
      window_hours: 5.0
      threshold_percent: 99.0
      probe_interval_seconds: 300
    weekly_quota_guard:
      enabled: false
      token_budget: 800000000 # 一周 token 预算（根据订阅计划调整）
      window_hours: 168.0 # 7 天滑动窗口
      threshold_percent: 99.0
      probe_interval_seconds: 1800 # 每 30 分钟探测一次

  # Vendor 1: GitHub Copilot Plans（中间层，默认禁用）
  - vendor: copilot
    enabled: true # 启用需 OAuth 登录或手动配置 github_token
    github_token: "${GITHUB_TOKEN}" # GitHub token（可选，运行 coding-proxy auth login 自动获取）
    account_type: "individual" # individual / business / enterprise
    token_url: "https://api.github.com/copilot_internal/v2/token"
    base_url: "" # 留空时按 account_type 自动解析；仅在特殊网络环境下显式覆盖
    timeout_ms: 300000
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout_seconds: 300
      success_threshold: 2
    quota_guard:
      enabled: true
      token_budget: 0
      window_hours: 24.0
      threshold_percent: 95.0
      probe_interval_seconds: 300

  # Vendor 2: Google Antigravity Plans（中间层，默认禁用）
  - vendor: antigravity
    enabled: false # 启用需配置 OAuth 凭据
    client_id: "${GOOG_CLIENT_ID}" # Google OAuth2 Client ID
    client_secret: "${GOOG_CLIENT_SECRET}" # Google OAuth2 Client Secret
    refresh_token: "${GOOG_REFRESH_TOKEN}" # Google OAuth2 Refresh Token
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    model_endpoint: "models/claude-sonnet-4-20250514"
    timeout_ms: 300000
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout_seconds: 300
      success_threshold: 2
    quota_guard:
      enabled: false # 启用后按 Premium Requests 配额管理
      token_budget: 0
      window_hours: 24.0
      threshold_percent: 95.0
      probe_interval_seconds: 300

  # Vendor 3: 智谱 GLM（终端兜底，无 circuit_breaker）
  - vendor: zhipu
    enabled: true
    base_url: "https://open.bigmodel.cn/api/anthropic"
    api_key: "${ZHIPU_API_KEY}"
    timeout_ms: 3000000
    # 不配置 circuit_breaker → 自动成为终端层，不触发向下故障转移
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout_seconds: 30
      success_threshold: 2
    quota_guard:
      enabled: true # 启用后按 Premium Requests 配额管理
      token_budget: 1000000000 # 一天 token 预算（根据订阅计划调整）
      window_hours: 24.0
      threshold_percent: 95.0
      probe_interval_seconds: 300

  # Vendor 4: MiniMax（默认禁用，需手动启用并添加到 tiers）
  - vendor: minimax
    enabled: false
    base_url: "https://api.minimaxi.com/anthropic"
    api_key: "${MINIMAX_API_KEY}"
    timeout_ms: 3000000
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout_seconds: 300
      success_threshold: 2
    quota_guard:
      enabled: false
      token_budget: 1000000000
      window_hours: 24.0
      threshold_percent: 95.0
      probe_interval_seconds: 300

  # Vendor 5: 阿里 Qwen（默认禁用）
  - vendor: alibaba
    enabled: false
    base_url: "https://coding-intl.dashscope.aliyuncs.com/apps/anthropic"
    api_key: "${ALIBABA_API_KEY}"
    timeout_ms: 3000000
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout_seconds: 300
      success_threshold: 2
    quota_guard:
      enabled: false
      token_budget: 1000000000
      window_hours: 24.0
      threshold_percent: 95.0
      probe_interval_seconds: 300

  # Vendor 6: 小米 MiMo（默认禁用）
  - vendor: xiaomi
    enabled: false
    base_url: "https://token-plan-cn.xiaomimimo.com/anthropic"
    api_key: "${XIAOMI_API_KEY}"
    timeout_ms: 3000000
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout_seconds: 300
      success_threshold: 2
    quota_guard:
      enabled: false
      token_budget: 1000000000
      window_hours: 24.0
      threshold_percent: 95.0
      probe_interval_seconds: 300

  # Vendor 7: Kimi（默认禁用）
  - vendor: kimi
    enabled: false
    base_url: "https://api.kimi.com/coding/"
    api_key: "${KIMI_API_KEY}"
    timeout_ms: 3000000
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout_seconds: 300
      success_threshold: 2
    quota_guard:
      enabled: false
      token_budget: 1000000000
      window_hours: 24.0
      threshold_percent: 95.0
      probe_interval_seconds: 300

  # Vendor 8: 豆包 Doubao（默认禁用）
  - vendor: doubao
    enabled: false
    base_url: "https://ark.cn-beijing.volces.com/api/coding"
    api_key: "${ARK_API_KEY}"
    timeout_ms: 3000000
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout_seconds: 300
      success_threshold: 2
    quota_guard:
      enabled: false
      token_budget: 1000000000
      window_hours: 24.0
      threshold_percent: 95.0
      probe_interval_seconds: 300

# === 故障转移触发条件 ===
failover:
  status_codes: [429, 403, 503, 500, 529]
  error_types:
    - "rate_limit_error"
    - "overloaded_error"
    - "api_error"
  error_message_patterns:
    - "quota"
    - "usage cap"
    - "internal network failure"

# === 模型映射 ===
model_mapping:
  # GitHub Copilot 可用模型（通过 /api/copilot/models 诊断获取）
  - pattern: "claude-sonnet-.*"
    vendors: ["copilot"]
    target: "claude-sonnet-4.6"
    is_regex: true
  - pattern: "claude-opus-.*"
    vendors: ["copilot"]
    target: "claude-opus-4.6"
    is_regex: true
  - pattern: "claude-haiku-.*"
    vendors: ["copilot"]
    target: "claude-haiku-4.5"
    is_regex: true
  # Google Antigravity 模型映射
  - pattern: "claude-sonnet-.*"
    vendors: ["antigravity"]
    target: "Claude Sonnet 4.6"
    is_regex: true
  - pattern: "claude-opus-.*"
    vendors: ["antigravity"]
    target: "Claude Opus 4.6 Thinking"
    is_regex: true
  - pattern: "claude-haiku-.*"
    vendors: ["antigravity"]
    target: "Gemini 3 Flash"
    is_regex: true
  # 智谱 GLM 映射（官方原生 Anthropic 兼容端点）
  # glm-5v-turbo 完整承载 Claude Code 满血能力（tool calling / thinking / 多模态）
  - pattern: "claude-sonnet-.*"
    vendors: ["zhipu"]
    target: "glm-5v-turbo"
    is_regex: true
  - pattern: "claude-opus-.*"
    vendors: ["zhipu"]
    target: "glm-5.1"
    is_regex: true
  - pattern: "claude-haiku-.*"
    vendors: ["zhipu"]
    target: "glm-4.5-air"
    is_regex: true
  # MiniMax 模型映射（原生 Anthropic 兼容端点）
  - pattern: "claude-sonnet-.*"
    vendors: ["minimax"]
    target: "minimax-m2.7"
    is_regex: true
  - pattern: "claude-opus-.*"
    vendors: ["minimax"]
    target: "minimax-m2.7"
    is_regex: true
  - pattern: "claude-haiku-.*"
    vendors: ["minimax"]
    target: "minimax-m2.7"
    is_regex: true
  # 阿里 Qwen 模型映射（原生 Anthropic 兼容端点）
  - pattern: "claude-sonnet-.*"
    vendors: ["alibaba"]
    target: "qwen3.6-plus"
    is_regex: true
  - pattern: "claude-opus-.*"
    vendors: ["alibaba"]
    target: "qwen3.6-plus"
    is_regex: true
  - pattern: "claude-haiku-.*"
    vendors: ["alibaba"]
    target: "qwen3.6-plus"
    is_regex: true
  # 小米 MiMo 模型映射（原生 Anthropic 兼容端点）
  - pattern: "claude-sonnet-.*"
    vendors: ["xiaomi"]
    target: "mimo-v2-pro"
    is_regex: true
  - pattern: "claude-opus-.*"
    vendors: ["xiaomi"]
    target: "mimo-v2-pro"
    is_regex: true
  - pattern: "claude-haiku-.*"
    vendors: ["xiaomi"]
    target: "mimo-v2-pro"
    is_regex: true
  # Kimi 模型映射（原生 Anthropic 兼容端点）
  - pattern: "claude-sonnet-.*"
    vendors: ["kimi"]
    target: "kimi-k2.5"
    is_regex: true
  - pattern: "claude-opus-.*"
    vendors: ["kimi"]
    target: "kimi-k2.5"
    is_regex: true
  - pattern: "claude-haiku-.*"
    vendors: ["kimi"]
    target: "kimi-k2.5"
    is_regex: true
  # 豆包 Doubao 模型映射（三个不同模型对应不同 Claude 模型槽位）
  - pattern: "claude-opus-.*"
    vendors: ["doubao"]
    target: "doubao-seed-2.0-code"
    is_regex: true
  - pattern: "claude-sonnet-.*"
    vendors: ["doubao"]
    target: "doubao-seed-2.0-pro"
    is_regex: true
  - pattern: "claude-haiku-.*"
    vendors: ["doubao"]
    target: "doubao-seed-2.0-lite"
    is_regex: true

