# coding-proxy 配置模板
# 复制到 ./config.yaml（项目根目录）或 ~/.coding-proxy/config.yaml 并填入实际密钥
# 优先级：./config.yaml > ~/.coding-proxy/config.yaml

server:
  host: "127.0.0.1"
  port: 8046

# === 后端层级（按优先级排列） ===

# Tier 0: Anthropic Claude Team Plan（最高优先级）
primary:
  enabled: true
  base_url: "https://api.anthropic.com"
  timeout_ms: 300000

# Tier 1: GitHub Copilot Team Plan（中间优先级）
copilot:
  enabled: false                     # 默认禁用，启用需 OAuth 登录或手动配置 github_token
  github_token: "${GITHUB_TOKEN}"    # GitHub token（可选，运行 coding-proxy auth login 自动获取）
  token_url: "https://api.github.com/copilot_internal/v2/token"
  base_url: "https://api.individual.githubcopilot.com"
  timeout_ms: 300000

# Tier 2: Google Antigravity Claude（中间层）
antigravity:
  enabled: false                        # 默认禁用，启用需配置 OAuth 凭据
  client_id: "${GOOG_CLIENT_ID}"        # Google OAuth2 Client ID
  client_secret: "${GOOG_CLIENT_SECRET}" # Google OAuth2 Client Secret
  refresh_token: "${GOOG_REFRESH_TOKEN}" # Google OAuth2 Refresh Token
  base_url: "https://generativelanguage.googleapis.com/v1beta"
  model_endpoint: "models/claude-sonnet-4-20250514"
  timeout_ms: 300000

# Tier 3: 智谱 GLM（终端兜底）
fallback:
  enabled: true
  base_url: "https://open.bigmodel.cn/api/anthropic"
  api_key: "${ZHIPU_API_KEY}"
  timeout_ms: 3000000

# === 弹性配置 ===

# Anthropic 熔断器
circuit_breaker:
  failure_threshold: 3
  recovery_timeout_seconds: 300
  success_threshold: 2

# Copilot 熔断器
copilot_circuit_breaker:
  failure_threshold: 3
  recovery_timeout_seconds: 300
  success_threshold: 2

# Antigravity 熔断器
antigravity_circuit_breaker:
  failure_threshold: 3
  recovery_timeout_seconds: 300
  success_threshold: 2

failover:
  status_codes: [429, 403, 503, 500]
  error_types:
    - "rate_limit_error"
    - "overloaded_error"
  error_message_patterns:
    - "quota"
    - "usage cap"

model_mapping:
  - pattern: "claude-sonnet-.*"
    target: "glm-5.1"
    is_regex: true
  - pattern: "claude-opus-.*"
    target: "glm-5.1"
    is_regex: true
  - pattern: "claude-haiku-.*"
    target: "glm-4.5-air"
    is_regex: true

# Anthropic 配额守卫
quota_guard:
  enabled: true
  token_budget: 45000000        # 5 小时 token 预算（根据订阅计划调整）
  window_hours: 5.0
  threshold_percent: 99.0
  probe_interval_seconds: 300

# Copilot 配额守卫
copilot_quota_guard:
  enabled: false
  token_budget: 0
  window_hours: 24.0
  threshold_percent: 95.0
  probe_interval_seconds: 300

# Antigravity 配额守卫
antigravity_quota_guard:
  enabled: false                # 默认禁用；启用后按 Premium Requests 配额管理
  token_budget: 0
  window_hours: 24.0
  threshold_percent: 95.0
  probe_interval_seconds: 300

database:
  path: "~/.coding-proxy/usage.db"

# === OAuth 登录配置 ===
auth:
  # GitHub Device Flow client_id（默认使用 Copilot VS Code 扩展公开 ID）
  # github_client_id: "Iv1.b507a08c87ecfe98"
  # Google OAuth 凭据（默认使用公开值）
  # google_client_id: "764086051850-6qr4p6gpi6hn506pt8ejuq83di341hur.apps.googleusercontent.com"
  # google_client_secret: "d-FL95Q19W7jAaasCmO6F9XZ"
  token_store_path: "~/.coding-proxy/tokens.json"

logging:
  level: "INFO"
