[project]
name = "coding-proxy"
version = "0.1.0"
description = "Claude Code 多后端智能代理 — 自动故障转移与 Token 用量追踪"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "httpx>=0.28",
    "pydantic>=2.10",
    "pyyaml>=6.0",
    "typer>=0.15",
    "aiosqlite>=0.20",
    "rich>=13.9",
]

[project.scripts]
coding-proxy = "coding.proxy.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coding"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]
